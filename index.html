<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ASCII Camera</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <h1>ASCII Camera</h1>
        <p class="tagline">Webカメラの映像をリアルタイムでASCIIアートに変換します</p>
      </header>

      <main class="main">
        <div class="preview-panel">
          <div class="ascii-wrap">
            <pre id="ascii" class="ascii" aria-live="polite"></pre>
          </div>
          <p id="status" class="status">カメラを開始してください</p>
        </div>

        <aside class="controls">
          <button type="button" id="btnToggle" class="btn btn-primary">
            カメラを開始
          </button>

          <label class="field">
            <span class="label">文字密度（列数）</span>
            <input
              type="range"
              id="cols"
              min="40"
              max="140"
              value="80"
              step="5"
            />
            <span class="value" id="colsValue">80</span>
          </label>

          <label class="field">
            <span class="label">コントラスト</span>
            <input type="range" id="contrast" min="0.5" max="2.5" value="1.2" step="0.05" />
            <span class="value" id="contrastValue">1.2</span>
          </label>

          <label class="check">
            <input type="checkbox" id="mirror" checked />
            <span>左右反転（鏡）</span>
          </label>

          <label class="check">
            <input type="checkbox" id="invert" />
            <span>輝度を反転</span>
          </label>

          <label class="check">
            <input type="checkbox" id="color" />
            <span>カラー（平均色）</span>
          </label>

          <label class="field">
            <span class="label">文字セット</span>
            <select id="charset">
              <option value="detailed">標準（細かい段階）</option>
              <option value="simple">シンプル</option>
              <option value="blocks">ブロック</option>
              <option value="minimal">ミニマル</option>
            </select>
          </label>
        </aside>
      </main>

      <footer class="footer">
        <small
          >HTTPSまたはlocalhostで開くとカメラが利用できます。ブラウザの許可ダイアログでカメラへのアクセスを許可してください。</small
        >
      </footer>
    </div>

    <!-- 非表示: 映像取得とピクセル読み取り用 -->
    <video id="video" playsinline muted autoplay></video>
    <canvas id="capture"></canvas>

    <script src="app.js"></script>
  </body>
</html>
